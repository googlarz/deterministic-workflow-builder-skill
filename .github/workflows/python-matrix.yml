name: Python Matrix

on:
  push:
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: python -m pip install --disable-pip-version-check ruff pre-commit
      - run: ruff check scripts tests
      - run: ruff format --check scripts tests
      - run: pre-commit run --all-files

  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m py_compile scripts/*.py
      - name: Verify sidecar registry hashes
        run: |
          python3 << 'PYEOF'
          import hashlib, json, pathlib, sys
          registry = json.loads(pathlib.Path("assets/sidecar-registry.json").read_text())
          errors = []
          for s in registry["sidecars"]:
              if "prompt_sha256" in s:
                  actual = hashlib.sha256(pathlib.Path(s["prompt_asset"]).read_bytes()).hexdigest()
                  if actual != s["prompt_sha256"]:
                      errors.append(f'{s["id"]}: expected {s["prompt_sha256"]} got {actual}')
          for e in errors:
              print(f"MISMATCH: {e}", file=sys.stderr)
          sys.exit(1 if errors else 0)
          PYEOF
      - run: python -m unittest discover -s tests -p 'test_*.py'

  package-smoke:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: python scripts/package_skill.py --output-dir dist
      - run: unzip -q dist/*.zip -d smoke-install
      - run: python smoke-install/deterministic-workflow-builder/scripts/init_deterministic_workflow.py smoke-flow --path smoke-install --steps collect
      - run: smoke-install/smoke-flow/run_workflow.sh --list
