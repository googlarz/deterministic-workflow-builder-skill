name: Python Matrix

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m py_compile scripts/*.py
      - name: Verify sidecar registry hashes
        run: python -c "
          import hashlib, json, pathlib, sys;
          registry = json.loads(pathlib.Path('assets/sidecar-registry.json').read_text());
          errors = [];
          [errors.append(f'{s[\"id\"]}: expected {s[\"prompt_sha256\"]} got {hashlib.sha256(pathlib.Path(s[\"prompt_asset\"]).read_bytes()).hexdigest()}')
           for s in registry['sidecars']
           if 'prompt_sha256' in s and hashlib.sha256(pathlib.Path(s['prompt_asset']).read_bytes()).hexdigest() != s['prompt_sha256']];
          [print(f'MISMATCH: {e}', file=sys.stderr) for e in errors];
          sys.exit(1 if errors else 0)
          "
      - run: python -m unittest discover -s tests -p 'test_*.py'
